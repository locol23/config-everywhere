name: Publish oxlint-config-everywhere

on:
  push:
    branches:
      - main
    paths:
      - 'packages/oxlint-config-everywhere/**'
      - '.github/workflows/publish-oxlint-config.yml'
    tags:
      - '!*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/
      - name: Check if publish is needed
        id: check-publish
        run: pnpx can-npm-publish && echo "should_publish=true" >> $GITHUB_OUTPUT || echo "should_publish=false" >> $GITHUB_OUTPUT
        working-directory: packages/oxlint-config-everywhere
      - name: Publish
        if: steps.check-publish.outputs.should_publish == 'true'
        run: npm publish --provenance
        working-directory: packages/oxlint-config-everywhere
      - name: package-version
        run: node -p -e '`PACKAGE_VERSION=${require("./packages/oxlint-config-everywhere/package.json").version}`' >> $GITHUB_ENV
      - name: package-version-to-git-tag
        uses: pkgdeps/git-tag-action@a5a161774bace8b4e1969dd850c67a7421f1b710 # v3.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: 'oxlint-config-everywhere-v'
